<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Мои сообщения</title></head>
<body style="background: #050505; color: white; font-family: sans-serif; text-align: center; padding-top: 100px;">
    <h2>Написать ей в реальном времени</h2>
    <textarea id="msg" style="width: 350px; height: 100px; border-radius: 15px; padding: 15px; background: #111; color: white; border: 1px solid #ff007f; outline: none;"></textarea><br><br>
    <button onclick="send()" style="padding: 12px 35px; background: #ff007f; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold;">Отправить</button>
    <p style="color: gray; margin-top: 20px;">Чтобы скрыть сообщение на сайте, отправь пустую строку.</p>
    <script>
        function send() {
            fetch('/send_admin', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: document.getElementById('msg').value})
            }).then(() => alert('Сообщение обновлено!'));
        }
    </script>
</body>
</html>
